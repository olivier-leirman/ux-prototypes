<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f7fc; color: #1a1a2e; }

  /* Layout */
  .page { max-width: 1200px; margin: 0 auto; padding: 32px 40px; }
  .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
  .page-header h1 { font-size: 28px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
  .page-header p { font-size: 14px; color: #6b6b80; }
  .btn-email-setup {
    display: flex; align-items: center; gap: 8px; padding: 10px 20px;
    border: 1px solid #d4d2e3; border-radius: 8px; background: white;
    font-size: 14px; color: #1a1a2e; cursor: pointer; white-space: nowrap;
  }
  .btn-email-setup:hover { background: #f8f7fc; }

  /* Tabs - ToggleButtonGroup */
  .tabs { display: inline-flex; gap: 0; margin-bottom: 24px; background: #f0f0f7; border-radius: 12px; padding: 4px; }
  .tab {
    padding: 8px 16px; font-size: 14px; color: rgba(8, 5, 36, 0.75); cursor: pointer;
    border-radius: 8px; transition: all 0.15s;
  }
  .tab:hover { color: #200845; }
  .tab.active { background: #fcfcff; color: #200845; font-weight: 500; box-shadow: 0 1px 2px rgba(31, 26, 69, 0.05); }

  /* Toolbar */
  .toolbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 20px 16px; }
  .search-box {
    display: flex; align-items: center; gap: 8px; padding: 10px 16px;
    border: 1px solid #e8e6f0; border-radius: 8px; background: white; width: 320px;
  }
  .search-box input {
    border: none; outline: none; font-size: 14px; color: #1a1a2e; width: 100%; background: transparent;
  }
  .search-box input::placeholder { color: #a8a6b8; }
  .search-icon { color: #a8a6b8; font-size: 16px; }
  .btn-mark-all {
    display: flex; align-items: center; gap: 8px; padding: 10px 20px;
    border: 1.5px solid #5b21b6; border-radius: 24px; background: white;
    font-size: 14px; color: #5b21b6; cursor: pointer; font-weight: 500;
  }
  .btn-mark-all:hover { background: #f5f0ff; }

  /* Content area with split view */
  .content-area { background: #fcfcff; border-radius: 12px; border: 1px solid #ebebf1; overflow: hidden; }
  .content-inner { display: flex; gap: 0; height: calc(100vh - 300px); min-height: 400px; }

  /* Notification list */
  .notification-list { flex: 1; min-width: 0; overflow-y: auto; }
  .notification-list.has-detail { flex: 1; max-width: none; border-right: 1px solid #e8e6f0; }
  .notification-item {
    display: flex; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f0f0f6;
    cursor: pointer; transition: background 0.1s; gap: 12px;
  }
  .notification-item:first-child { border-top: 1px solid #f0f0f6; }
  .notification-item:hover { background: rgba(31, 26, 69, 0.02); }
  .notification-item.selected { background: rgba(31, 26, 69, 0.031); }
  .notification-item:last-child { border-bottom: none; }
  .notif-icon {
    width: 36px; height: 36px; border-radius: 8px; background: #f5f0ff;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    color: #5b21b6; font-size: 14px;
  }
  .notif-content { flex: 1; min-width: 0; }
  .notif-title { font-size: 14px; font-weight: 500; color: #1a1a2e; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .notif-meta { font-size: 12px; color: #a8a6b8; }
  .notif-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .btn-read-toggle { font-size: 13px; color: #5b21b6; cursor: pointer; white-space: nowrap; background: none; border: none; }
  .btn-read-toggle:hover { text-decoration: underline; }
  .read-label { font-size: 13px; color: #a8a6b8; }
  .unread-dot { width: 8px; height: 8px; border-radius: 50%; background: #5b21b6; flex-shrink: 0; }

  /* Detail panel */
  .detail-panel { flex: 2; padding: 24px; overflow-y: auto; display: none; background: rgba(31, 26, 69, 0.031); }
  .detail-panel.open { display: block; }
  .detail-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .detail-header-left { display: flex; align-items: center; gap: 12px; }
  .btn-close { width: 32px; height: 32px; border-radius: 50%; border: none; background: none; cursor: pointer; font-size: 18px; color: #6b6b80; display: flex; align-items: center; justify-content: center; }
  .btn-close:hover { background: #f5f0ff; }
  .detail-title { font-size: 20px; font-weight: 600; }
  .detail-header-right { display: flex; align-items: center; gap: 12px; }
  .btn-mark-unread {
    display: flex; align-items: center; gap: 6px; padding: 8px 14px;
    border: 1px solid #d4d2e3; border-radius: 8px; background: white;
    font-size: 13px; color: #1a1a2e; cursor: pointer;
  }
  .btn-mark-unread:hover { background: #f8f7fc; }
  .btn-go-to-page {
    display: flex; align-items: center; gap: 6px; padding: 8px 16px;
    border: none; border-radius: 8px; background: #5b21b6; color: white;
    font-size: 13px; cursor: pointer; font-weight: 500;
  }
  .btn-go-to-page:hover { background: #4c1d95; }
  .nav-arrows { display: flex; gap: 4px; }
  .nav-arrow {
    width: 32px; height: 32px; border-radius: 50%; border: 1px solid #e8e6f0;
    background: white; cursor: pointer; display: flex; align-items: center;
    justify-content: center; font-size: 14px; color: #6b6b80;
  }
  .nav-arrow:hover { background: #f5f0ff; border-color: #5b21b6; color: #5b21b6; }

  /* Detail body */
  .detail-date { font-size: 13px; color: #6b6b80; margin-bottom: 12px; }
  .detail-order-row { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; flex-wrap: wrap; }
  .channel-icon { font-size: 20px; }
  .channel-name { font-size: 16px; font-weight: 600; }
  .order-type { font-size: 14px; color: #6b6b80; }
  .badge-completed {
    display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px;
    border-radius: 16px; background: #ecfdf5; color: #059669; font-size: 12px; font-weight: 500;
  }
  .detail-price { font-size: 28px; font-weight: 700; color: #1a1a2e; text-align: right; }
  .detail-order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .order-id-row { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
  .order-id { font-size: 13px; color: #6b6b80; }
  .btn-copy { background: none; border: none; cursor: pointer; color: #a8a6b8; font-size: 14px; }
  .btn-copy:hover { color: #5b21b6; }

  /* Info cards */
  .info-cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .info-card { padding: 16px; border: 1px solid #ebebf1; border-radius: 10px; background: #fcfcff; }
  .info-card-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .info-card .label { font-size: 12px; color: #6b6b80; margin-bottom: 2px; }
  .info-card .value { font-size: 13px; color: #1a1a2e; margin-bottom: 8px; word-break: break-all; }
  .info-card .value:last-child { margin-bottom: 0; }
  .badge-paid {
    display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px;
    border-radius: 12px; background: #ecfdf5; color: #059669; font-size: 11px; font-weight: 500;
  }
  .totals-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .totals-row .label { font-size: 12px; color: #6b6b80; }
  .totals-row .value { font-size: 12px; color: #1a1a2e; }
  .totals-row.grand { font-weight: 600; margin-top: 4px; padding-top: 4px; border-top: 1px solid #e8e6f0; }
  .totals-row.grand .label, .totals-row.grand .value { font-size: 13px; }

  /* Items table */
  .items-table { width: 100%; border-collapse: collapse; font-size: 13px; background: #fcfcff; border: 1px solid #ebebf1; border-radius: 8px; overflow: hidden; }
  .items-table th {
    text-align: left; padding: 10px 12px; background: #fcfcff;
    font-weight: 600; font-size: 12px; color: #6b6b80; border-bottom: 1px solid #f0f0f6;
  }
  .items-table td { padding: 12px; border-bottom: 1px solid #f0f0f6; vertical-align: top; }
  .items-table tr:last-child td { border-bottom: none; }

  /* Activity log */
  .activity-log { margin-top: 24px; }
  .activity-log-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
  .activity-entry { display: flex; gap: 12px; }
  .activity-dot-line { display: flex; flex-direction: column; align-items: center; }
  .activity-dot { width: 10px; height: 10px; border-radius: 50%; background: #5b21b6; flex-shrink: 0; margin-top: 4px; }
  .activity-line { width: 2px; flex: 1; background: #e8e6f0; min-height: 20px; }
  .activity-entry:last-child .activity-line { display: none; }
  .activity-body { padding-bottom: 16px; }
  .activity-time { font-size: 12px; color: #a8a6b8; margin-bottom: 2px; }
  .activity-text { font-size: 13px; color: #1a1a2e; }

  /* Pagination */
  .pagination-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px; border-top: 1px solid #e8e6f0; font-size: 13px; color: #6b6b80;
  }
  .pagination-left { display: flex; align-items: center; gap: 16px; }
  .rows-select { display: flex; align-items: center; gap: 6px; }
  .rows-select select {
    border: 1px solid #e8e6f0; border-radius: 4px; padding: 4px 8px;
    font-size: 13px; background: white; color: #5b21b6; cursor: pointer;
  }
  .pagination-right { display: flex; align-items: center; gap: 4px; }
  .page-btn {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid #e8e6f0;
    background: white; cursor: pointer; display: flex; align-items: center;
    justify-content: center; font-size: 13px; color: #6b6b80;
  }
  .page-btn:hover { border-color: #5b21b6; color: #5b21b6; }
  .page-btn.active { background: #5b21b6; color: white; border-color: #5b21b6; }
  .page-btn.disabled { opacity: 0.3; cursor: default; pointer-events: none; }
  .page-ellipsis { width: 32px; text-align: center; color: #a8a6b8; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #1a1a2e; color: white; padding: 12px 24px; border-radius: 8px;
    font-size: 14px; opacity: 0; transition: all 0.3s; z-index: 100; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Scrollbar */
  .detail-panel::-webkit-scrollbar { width: 6px; }
  .detail-panel::-webkit-scrollbar-thumb { background: #d4d2e3; border-radius: 3px; }
  .notification-list::-webkit-scrollbar { width: 6px; }
  .notification-list::-webkit-scrollbar-thumb { background: #d4d2e3; border-radius: 3px; }
</style>
</head>
<body>

<div class="page">
  <!-- Header -->
  <div class="page-header">
    <div>
      <h1>Notifications</h1>
      <p>On this page you will find an overview of all notifications.</p>
    </div>
    <button class="btn-email-setup">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 6 10-6"/></svg>
      Set up email notifications
    </button>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="all">All</div>
    <div class="tab" data-tab="transactional">Transactional</div>
    <div class="tab" data-tab="imports">Imports &amp; Exports</div>
    <div class="tab" data-tab="configurations">Configurations</div>
    <div class="tab" data-tab="content">Content</div>
  </div>

  <!-- Content -->
  <div class="content-area">
    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-box">
        <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search for notification">
      </div>
      <button class="btn-mark-all" id="btnMarkAll">
        Mark all as read
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
      </button>
    </div>
    <div class="content-inner">
      <div class="notification-list" id="notifList"></div>
      <div class="detail-panel" id="detailPanel"></div>
    </div>
    <!-- Pagination -->
    <div class="pagination-bar">
    <div class="pagination-left">
      <div class="rows-select">
        ROWS PER PAGE:
        <select id="rowsPerPage">
          <option value="10" selected>10</option>
          <option value="25">25</option>
          <option value="50">50</option>
        </select>
      </div>
      <span id="pageInfo">1-10 OF 9420</span>
    </div>
    <div class="pagination-right" id="paginationBtns"></div>
  </div>
  </div>

<div class="toast" id="toast"></div>

<script>
// --- Data ---
const channels = ['Vending Machine', 'Webshop', 'Presentation'];
const channelIcons = { 'Vending Machine': '🏭', 'Webshop': '🛒', 'Presentation': '▶️' };
const categories = ['transactional', 'imports', 'configurations', 'content'];
const statuses = ['Order completed', 'Order pending', 'Order cancelled', 'Processing'];
const statusColors = { 'Order completed': '#059669', 'Order pending': '#d97706', 'Order cancelled': '#dc2626', 'Processing': '#2563eb' };
const statusBg = { 'Order completed': '#ecfdf5', 'Order pending': '#fffbeb', 'Order cancelled': '#fef2f2', 'Processing': '#eff6ff' };
const items = [
  { name: 'Dafalgan Pediatrie 80mg Suppo 12', code: 'CNK: 3606134', price: 3.61, vat: 0.20, vatPct: '6%' },
  { name: 'Ibuprofen 400mg Tablets 20', code: 'CNK: 2504821', price: 5.49, vat: 0.33, vatPct: '6%' },
  { name: 'Paracetamol 500mg Caps 30', code: 'CNK: 1108742', price: 2.89, vat: 0.17, vatPct: '6%' },
  { name: 'Vitamine D3 1000IU Drops', code: 'CNK: 4401239', price: 8.95, vat: 0.54, vatPct: '6%' },
];
const names = ['john.doe@vending-solutions.com', 'anna.smith@pharmacy.be', 'marc.dupont@health.eu', 'lisa.janssen@care.nl'];
const phones = ['+32 478 99 66 44', '+32 495 12 34 56', '+32 468 77 88 99', '+32 487 55 44 33'];
const times = ['10 minutes ago', '25 minutes ago', '1 hour ago', '2 hours ago', '5 hours ago', 'Yesterday', '2 days ago'];

function randId() { return 'SC-' + crypto.getRandomValues(new Uint8Array(8)).reduce((a,b) => a + b.toString(16).padStart(2,'0'), '') + ' - M' + String(Math.floor(Math.random()*99999)).padStart(5,'0'); }
function randTxId() { return 'transaction-' + crypto.getRandomValues(new Uint8Array(8)).reduce((a,b) => a + b.toString(16).padStart(2,'0'), ''); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randPrice() { return (Math.random() * 20 + 1).toFixed(2); }

const TOTAL_NOTIFICATIONS = 9420;
const allNotifications = [];
for (let i = 0; i < 120; i++) {
  const channel = pick(channels);
  const cat = i < 40 ? 'transactional' : pick(categories);
  const status = pick(statuses);
  const numItems = i % 3 === 0 ? Math.floor(Math.random() * 6) + 4 : Math.floor(Math.random() * 3) + 1;
  const orderItems = [];
  for (let j = 0; j < numItems; j++) {
    const item = pick(items);
    const qty = Math.floor(Math.random() * 3) + 1;
    orderItems.push({ ...item, quantity: qty, total: (item.price * qty).toFixed(2), discount: 0 });
  }
  const grandTotal = orderItems.reduce((s, it) => s + parseFloat(it.total), 0).toFixed(2);
  const totalTax = orderItems.reduce((s, it) => s + it.vat * it.quantity, 0).toFixed(2);

  allNotifications.push({
    id: i,
    title: cat === 'transactional' ? `New order from ${channel}` : cat === 'imports' ? 'Import completed' : cat === 'configurations' ? 'Configuration updated' : 'Content published',
    time: pick(times),
    channel,
    channelLabel: channel,
    category: cat,
    read: i > 4 ? Math.random() > 0.5 : false,
    status,
    orderId: randId(),
    transactionId: randTxId(),
    date: 'NOV ' + (Math.floor(Math.random() * 28) + 1) + ' 2025 , ' + String(Math.floor(Math.random()*12)+1).padStart(2,'0') + ':' + String(Math.floor(Math.random()*60)).padStart(2,'0') + ':' + String(Math.floor(Math.random()*60)).padStart(2,'0') + ' AM',
    email: pick(names),
    phone: pick(phones),
    price: grandTotal,
    items: orderItems,
    totalTax,
    paid: Math.random() > 0.3,
    notes: i % 2 === 0 ? [
      { time: 'NOV ' + (Math.floor(Math.random()*28)+1) + ' 2025, 09:15 AM', text: 'Order placed by customer via ' + channel },
      { time: 'NOV ' + (Math.floor(Math.random()*28)+1) + ' 2025, 09:16 AM', text: 'Payment received and verified' },
      { time: 'NOV ' + (Math.floor(Math.random()*28)+1) + ' 2025, 09:20 AM', text: 'Order confirmed and sent to fulfillment' },
      { time: 'NOV ' + (Math.floor(Math.random()*28)+1) + ' 2025, 10:05 AM', text: 'Items picked and packed' },
      { time: 'NOV ' + (Math.floor(Math.random()*28)+1) + ' 2025, 10:28 AM', text: 'Order dispatched to customer' },
    ] : [],
  });
}

// --- State ---
let currentTab = 'all';
let currentPage = 1;
let rowsPerPage = 10;
let selectedId = null;
let searchQuery = '';

function getFiltered() {
  let list = allNotifications;
  if (currentTab !== 'all') list = list.filter(n => n.category === currentTab);
  if (searchQuery) list = list.filter(n => n.title.toLowerCase().includes(searchQuery.toLowerCase()) || n.channel.toLowerCase().includes(searchQuery.toLowerCase()));
  return list;
}

function render() {
  const filtered = getFiltered();
  const total = filtered.length;
  const totalDisplay = currentTab === 'all' && !searchQuery ? TOTAL_NOTIFICATIONS : total;
  const start = (currentPage - 1) * rowsPerPage;
  const pageItems = filtered.slice(start, start + rowsPerPage);
  const hasDetail = selectedId !== null;

  const listEl = document.getElementById('notifList');
  listEl.className = 'notification-list' + (hasDetail ? ' has-detail' : '');

  listEl.innerHTML = pageItems.map(n => `
    <div class="notification-item ${n.id === selectedId ? 'selected' : ''}" data-id="${n.id}">
      <div class="notif-icon">${channelIcons[n.channel] || '▶️'}</div>
      <div class="notif-content">
        <div class="notif-title">${n.title}</div>
        <div class="notif-meta">${n.time} · ${n.channelLabel}</div>
      </div>
      <div class="notif-actions">
        ${n.read
          ? '<span class="read-label">Read</span>'
          : `<button class="btn-read-toggle" data-action="markread" data-id="${n.id}">Mark as read</button><div class="unread-dot"></div>`
        }
      </div>
    </div>
  `).join('');

  // Pagination
  const totalPages = Math.max(1, Math.ceil(totalDisplay / rowsPerPage));
  const endItem = Math.min(start + rowsPerPage, totalDisplay);
  document.getElementById('pageInfo').textContent = `${start + 1}-${endItem} OF ${totalDisplay}`;

  let pagBtns = '';
  pagBtns += `<button class="page-btn ${currentPage <= 1 ? 'disabled' : ''}" data-page="first">«</button>`;
  pagBtns += `<button class="page-btn ${currentPage <= 1 ? 'disabled' : ''}" data-page="prev">‹</button>`;
  const maxPageBtns = 5;
  let pageStart = Math.max(1, currentPage - 2);
  let pageEnd = Math.min(totalPages, pageStart + maxPageBtns - 1);
  if (pageEnd - pageStart < maxPageBtns - 1) pageStart = Math.max(1, pageEnd - maxPageBtns + 1);
  if (pageStart > 1) pagBtns += `<span class="page-ellipsis">…</span>`;
  for (let p = pageStart; p <= pageEnd; p++) {
    pagBtns += `<button class="page-btn ${p === currentPage ? 'active' : ''}" data-page="${p}">${p}</button>`;
  }
  if (pageEnd < totalPages) pagBtns += `<span class="page-ellipsis">…</span>`;
  if (pageEnd < totalPages) pagBtns += `<button class="page-btn" data-page="${totalPages}">${totalPages}</button>`;
  pagBtns += `<button class="page-btn ${currentPage >= totalPages ? 'disabled' : ''}" data-page="next">›</button>`;
  pagBtns += `<button class="page-btn ${currentPage >= totalPages ? 'disabled' : ''}" data-page="last">»</button>`;
  document.getElementById('paginationBtns').innerHTML = pagBtns;

  // Detail
  renderDetail();
}

function renderDetail() {
  const panel = document.getElementById('detailPanel');
  if (selectedId === null) {
    panel.classList.remove('open');
    return;
  }
  const n = allNotifications.find(x => x.id === selectedId);
  if (!n) { panel.classList.remove('open'); return; }
  panel.classList.add('open');

  const itemRows = n.items.map(it => `
    <tr>
      <td>${it.name}</td>
      <td>${it.code}</td>
      <td>${it.quantity}</td>
      <td>€ ${it.price}</td>
      <td>€ ${(it.vat * it.quantity).toFixed(2)} (${it.vatPct})</td>
      <td>€ ${it.discount.toFixed(2)}</td>
      <td>€ ${it.total}</td>
    </tr>
  `).join('');

  panel.innerHTML = `
    <div class="detail-header">
      <div class="detail-header-left">
        <button class="btn-close" id="btnCloseDetail">✕</button>
        <span class="detail-title">Order details</span>
      </div>
      <div class="detail-header-right">
        <button class="btn-mark-unread" id="btnToggleRead">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 6 10-6"/></svg>
          ${n.read ? 'Mark as unread' : 'Mark as read'}
        </button>
        <button class="btn-go-to-page">
          Go to page
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </button>
        <div class="nav-arrows">
          <button class="nav-arrow" id="btnPrevNotif">‹</button>
          <button class="nav-arrow" id="btnNextNotif">›</button>
        </div>
      </div>
    </div>
    <div class="detail-date">${n.date}</div>
    <div class="detail-order-header">
      <div class="detail-order-row">
        <span class="channel-icon">${channelIcons[n.channel] || '▶️'}</span>
        <span class="channel-name">${n.channel}</span>
        <span class="order-type">New order</span>
        <span class="badge-completed" style="background:${statusBg[n.status]};color:${statusColors[n.status]}">
          <svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm-1 15l-5-5 1.41-1.41L11 14.17l7.59-7.59L20 8l-9 9z"/></svg>
          ${n.status}
        </span>
      </div>
      <div class="detail-price">€ ${n.price}</div>
    </div>
    <div class="order-id-row">
      <span class="order-id">${n.orderId}</span>
      <button class="btn-copy" title="Copy" onclick="copyToClip('${n.orderId}')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </button>
    </div>
    <div class="info-cards">
      <div class="info-card">
        <div class="info-card-title">Customer details</div>
        <div class="label">Email address</div>
        <div class="value">${n.email}</div>
        <div class="label">Phone number</div>
        <div class="value">${n.phone}</div>
      </div>
      <div class="info-card">
        <div class="info-card-title">
          Transaction details
          ${n.paid ? '<span class="badge-paid"><svg width="10" height="10" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm-1 15l-5-5 1.41-1.41L11 14.17l7.59-7.59L20 8l-9 9z"/></svg> Paid</span>' : ''}
        </div>
        <div class="label">Transaction ID</div>
        <div class="value">${n.transactionId}</div>
      </div>
      <div class="info-card">
        <div class="info-card-title">Order totals</div>
        <div class="totals-row"><span class="label">Shipping & handling</span><span class="value">€ 0.00</span></div>
        <div class="totals-row"><span class="label">Discount</span><span class="value">€ 0.00</span></div>
        <div class="totals-row"><span class="label">Total tax</span><span class="value">€ ${n.totalTax}</span></div>
        <div class="totals-row grand"><span class="label">Grand total (incl. tax)</span><span class="value">€ ${n.price}</span></div>
      </div>
    </div>
    <table class="items-table">
      <thead>
        <tr><th>Item</th><th>Code</th><th>Quantity</th><th>Price</th><th>VAT</th><th>Discount</th><th>Total</th></tr>
      </thead>
      <tbody>${itemRows}</tbody>
    </table>
    ${n.notes && n.notes.length ? `
    <div class="activity-log">
      <div class="activity-log-title">Activity log</div>
      ${n.notes.map(note => `
        <div class="activity-entry">
          <div class="activity-dot-line"><div class="activity-dot"></div><div class="activity-line"></div></div>
          <div class="activity-body">
            <div class="activity-time">${note.time}</div>
            <div class="activity-text">${note.text}</div>
          </div>
        </div>
      `).join('')}
    </div>
    ` : ''}
  `;

  // Bind detail events
  document.getElementById('btnCloseDetail').onclick = () => { selectedId = null; render(); };
  document.getElementById('btnToggleRead').onclick = () => {
    n.read = !n.read;
    showToast(n.read ? 'Marked as read' : 'Marked as unread');
    render();
  };
  document.getElementById('btnPrevNotif').onclick = () => navigateNotif(-1);
  document.getElementById('btnNextNotif').onclick = () => navigateNotif(1);
}

function navigateNotif(dir) {
  const filtered = getFiltered();
  const start = (currentPage - 1) * rowsPerPage;
  const pageItems = filtered.slice(start, start + rowsPerPage);
  const idx = pageItems.findIndex(n => n.id === selectedId);
  const newIdx = idx + dir;
  if (newIdx >= 0 && newIdx < pageItems.length) {
    selectedId = pageItems[newIdx].id;
    render();
  }
}

function copyToClip(text) {
  navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// --- Events ---
// Tabs
document.querySelector('.tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentTab = tab.dataset.tab;
  currentPage = 1;
  selectedId = null;
  render();
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  currentPage = 1;
  render();
});

// Mark all
document.getElementById('btnMarkAll').addEventListener('click', () => {
  const filtered = getFiltered();
  filtered.forEach(n => n.read = true);
  showToast('All notifications marked as read');
  render();
});

// List clicks
document.getElementById('notifList').addEventListener('click', e => {
  const readBtn = e.target.closest('[data-action="markread"]');
  if (readBtn) {
    e.stopPropagation();
    const id = parseInt(readBtn.dataset.id);
    const n = allNotifications.find(x => x.id === id);
    if (n) { n.read = true; showToast('Marked as read'); render(); }
    return;
  }
  const item = e.target.closest('.notification-item');
  if (item) {
    selectedId = parseInt(item.dataset.id);
    render();
  }
});

// Pagination
document.getElementById('paginationBtns').addEventListener('click', e => {
  const btn = e.target.closest('.page-btn');
  if (!btn || btn.classList.contains('disabled')) return;
  const p = btn.dataset.page;
  const filtered = getFiltered();
  const totalDisplay = currentTab === 'all' && !searchQuery ? TOTAL_NOTIFICATIONS : filtered.length;
  const totalPages = Math.ceil(totalDisplay / rowsPerPage);
  if (p === 'first') currentPage = 1;
  else if (p === 'last') currentPage = totalPages;
  else if (p === 'prev') currentPage = Math.max(1, currentPage - 1);
  else if (p === 'next') currentPage = Math.min(totalPages, currentPage + 1);
  else currentPage = parseInt(p);
  render();
});

document.getElementById('rowsPerPage').addEventListener('change', e => {
  rowsPerPage = parseInt(e.target.value);
  currentPage = 1;
  render();
});

// Init
render();
</script>
</body>
</html>
